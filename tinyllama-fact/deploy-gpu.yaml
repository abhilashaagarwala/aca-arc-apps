apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyllama-gpu
  namespace: gpu-workloads
  labels:
    app: tinyllama-gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyllama-gpu
  template:
    metadata:
      labels:
        app: tinyllama-gpu
    spec:
      runtimeClassName: nvidia
      imagePullSecrets:
        - name: acr-pull
      containers:
        - name: tinyllama
          image: nvidiartxsffacrairs6.azurecr.io/tinyllama-fact:gpu
          ports:
            - containerPort: 8000
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
          resources:
            limits:
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tinyllama-gpu
  namespace: gpu-workloads
spec:
  selector:
    app: tinyllama-gpu
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
